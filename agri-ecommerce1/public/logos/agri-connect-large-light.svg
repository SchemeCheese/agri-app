<svg xmlns="http://www.w3.org/2000/svg" width="800" height="142" viewBox="0 0 716 142">
  <defs>
    <linearGradient id="lg2A" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#BFFFE4"/>
      <stop offset="1" stop-color="#33D17A"/>
    </linearGradient>
    <linearGradient id="lg2Soil" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1BAA62"/>
      <stop offset="1" stop-color="#117344"/>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="none"/>

  <!-- Icon -->
  <g transform="translate(26,14)">
    <path d="M56 0 L112 116 L90 116 L74 86 H38 L22 116 H0 L56 0 Z" fill="#FFFFFF"/>
    <path d="M49 56 C56 36, 75 25, 98 21 C90 46, 73 66, 50 76 C46 70, 46 62, 49 56 Z"
          fill="url(#lg2A)"/>
    <path d="M10 116 C28 100, 47 95, 68 95 C89 95, 105 100, 112 116 Z"
          fill="url(#lg2Soil)" opacity="0.9"/>
  </g>

  <!-- Wordmark (bigger + no extra space) -->
  <g transform="translate(146,100)">
    <!-- GRI (white) -->
    <text x="0" y="0"
      font-family="Montserrat, Poppins, Inter, Arial, sans-serif"
      font-size="80"
      font-weight="750"
      letter-spacing="2.5"
      fill="#FFFFFF">GRI</text>

    <!-- Hyphen (light green like current) -->
    <text x="152" y="-5"
      font-family="Montserrat, Poppins, Inter, Arial, sans-serif"
      font-size="80"
      font-weight="750"
      letter-spacing="2.5"
      fill="#33D17A">-</text>

    <!-- CONNECT (dark green like leaf/soil) -->
    <text x="190" y="0"
      font-family="Montserrat, Poppins, Inter, Arial, sans-serif"
      font-size="80"
      font-weight="750"
      letter-spacing="2.5"
      fill="#FFFFFF">CONNECT</text>
  </g>
</svg>